[pytest]
asyncio_mode = auto

# 测试目录：根目录下的 tests
testpaths =
    tests/unit
    tests/interface

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --strict-markers
    --strict-config
    -ra

markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    slow: Slow running tests
    asyncio: Async tests

filterwarnings =
    # 模型类名以 Test 开头但并非测试类，避免 PytestCollectionWarning 噪音
    ignore::pytest.PytestCollectionWarning
